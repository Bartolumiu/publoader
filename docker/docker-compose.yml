services:
  publoader:
    image: ardax/publoader:latest
    container_name: publoader
    restart: unless-stopped
    # The GitHub webhook listener binds 8080 inside the container. We do NOT
    # publish it to the host — exposing it there would put the endpoint on the
    # host's public interface, reachable bypassing the tunnel (HMAC is the only
    # guard then). `expose` keeps it reachable only from other services on this
    # compose network, i.e. the cloudflared tunnel below.
    expose:
      - "8080"
    volumes:
      - ./config.ini:/app/config.ini
      - ./logs:/app/logs
      - extensions:/app/publoader/extensions
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./resources:/app/resources
    entrypoint: [ "/app/entrypoint.sh" ]
    command: [ "python", "run.py" ]
    # Opt this container in to autoheal (see the autoheal service below).
    labels:
      - autoheal=true
    # Liveness probe. run.py runs a daemon thread that rewrites
    # /tmp/publoader_heartbeat every few seconds; we treat a missing or stale
    # (>60s old) file as "process wedged". This is independent of the webhook
    # (works even with [GithubWebhook]ENABLED=false) and keeps ticking through
    # long extension runs, so a busy-but-healthy bot is never falsely restarted.
    # curl isn't in the image (python:3.10-bullseye), so probe with stdlib only.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import time,os,sys; p='/tmp/publoader_heartbeat'; sys.exit(0 if os.path.exists(p) and time.time()-float(open(p).read() or 0) < 60 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      # Cover entrypoint dep-install + first-deploy extensions bootstrap before
      # run.py starts writing the heartbeat, so a slow startup isn't flagged.
      start_period: 120s

  publoader-bot:
    # Discord control bot. Runs in its own container so it stays online even
    # when the scheduler is down — commands will reply "instance not running"
    # rather than going silent. Talks to the scheduler over the unix socket
    # in the shared `resources` bind mount, and to the docker daemon via the
    # mounted socket so /start, /shutdown and /restart can control the
    # scheduler container even when it isn't responding to IPC.
    image: ardax/publoader:latest
    container_name: publoader-bot
    restart: unless-stopped
    depends_on:
      publoader:
        condition: service_started
    environment:
      - PUBLOADER_SCHEDULER_CONTAINER=publoader
    volumes:
      - ./config.ini:/app/config.ini
      - ./logs:/app/logs
      - extensions:/app/publoader/extensions:ro
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./resources:/app/resources
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: [ "/app/entrypoint.sh" ]
    command: [ "python", "-m", "publoader.bot.server" ]

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 1 * * *
    depends_on:
      - publoader
      - publoader-bot

  cloudflared:
    # Public ingress for the GitHub push webhook. The tunnel is created and its
    # ingress is configured in the Cloudflare Zero Trust dashboard (token-based,
    # remotely managed); add a Public Hostname routing your chosen hostname to
    # `http://publoader:8080` — `publoader` resolves over this compose network.
    # GitHub then posts to https://<hostname>/webhook. See README "Push-based
    # updates" for the full setup, including the optional GitHub source-IP WAF
    # allowlist. Nothing is published on the host: the tunnel is the only path in.
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_PUBLOADER_TUNNEL_TOKEN}
    depends_on:
      publoader:
        condition: service_started

  autoheal:
    # Restarts any container marked unhealthy by its Docker healthcheck. The
    # scheduler self-heals from a hard *crash* (restart: unless-stopped relaunches
    # the exited container), but a *hung* process never exits, so nothing brings
    # it back — that's the gap the 27th outage exposed. autoheal watches the
    # publoader healthcheck (above) and restarts the container when it goes
    # unhealthy. Scoped to opted-in containers only via the `autoheal=true` label,
    # so it can't restart the bot/tunnel/watchtower out from under you.
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=15
      # Give a restarted container time to pass its start_period before autoheal
      # is allowed to act on it again, so a slow boot doesn't cause a restart loop.
      - AUTOHEAL_START_PERIOD=120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  extensions:
