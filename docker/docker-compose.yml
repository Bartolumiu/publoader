services:
  publoader:
    image: ardax/publoader:latest
    container_name: publoader
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Lets `/pull extensions` and `/pull extensions-private` git-pull the
      # bind-mounted source clones below.
      - PUBLOADER_REPO_EXTENSIONS=/sources/public
      - PUBLOADER_REPO_EXTENSIONS_PRIVATE=/sources/private
    volumes:
      - ./config.ini:/app/config.ini
      - ./logs:/app/logs
      - extensions:/app/publoader/extensions
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./sync_extensions.py:/app/sync_extensions.py:ro
      - ./resources:/app/resources
      # Host clones of the extension repos. The entrypoint runs sync_extensions.py
      # over each `/sources/<name>/` on every container start, so a `git pull` +
      # `docker compose restart publoader` is the canonical refresh path.
      - ./publoader-extensions:/sources/public
      - ./publoader-extensions-private:/sources/private
    entrypoint: [ "/app/entrypoint.sh" ]
    command: [ "python", "run.py" ]

  publoader-bot:
    # Discord control bot. Runs in its own container so it stays online even
    # when the scheduler is down — commands will reply "instance not running"
    # rather than going silent. Talks to the scheduler over the unix socket
    # in the shared `resources` bind mount, and to the docker daemon via the
    # mounted socket so /start, /shutdown and /restart can control the
    # scheduler container even when it isn't responding to IPC.
    image: ardax/publoader:latest
    container_name: publoader-bot
    restart: unless-stopped
    depends_on:
      publoader:
        condition: service_started
    environment:
      - PUBLOADER_SCHEDULER_CONTAINER=publoader
    volumes:
      - ./config.ini:/app/config.ini
      - ./logs:/app/logs
      - extensions:/app/publoader/extensions:ro
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./resources:/app/resources
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: [ "/app/entrypoint.sh" ]
    command: [ "python", "-m", "publoader.bot.server" ]

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 1 * * *
    depends_on:
      - publoader
      - publoader-bot

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_PUBLOADER_TUNNEL_TOKEN}

volumes:
  extensions:
